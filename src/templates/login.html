<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { display: flex; justify-content: center; align-items: center; background-color: #f8f9fa; padding: 1rem; }
    .login-container { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08), 0 4px 12px rgba(15, 23, 42, 0.05); width: 100%; max-width: 380px; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .login-title { font-size: 1.75rem; font-weight: 700; text-align: center; margin: 0 0 1.5rem 0; color: #333; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #555; }
    input[type="text"], input[type="password"] { width: 100%; padding: 0.875rem 1rem; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: #7209b7; outline: none; box-shadow: 0 0 0 3px rgba(114, 9, 183, 0.15); }
    button { width: 100%; padding: 0.875rem; background-color: #7209b7; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: background-color 0.2s, transform 0.1s; }
    button:hover { background-color: #5a067c; }
    button:active { transform: scale(0.98); }
    .error-message { color: #dc3545; font-size: 0.875rem; margin-top: 0.5rem; text-align: center; display: none; }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; color: #7209b7; text-decoration: none; font-size: 0.875rem; }
    .back-link:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      body { padding: 0.75rem; align-items: flex-start; padding-top: 2rem; }
      .login-container { padding: 1.5rem; max-width: 100%; }
      .login-title { font-size: 1.5rem; margin-bottom: 1.25rem; }
      .form-group { margin-bottom: 1rem; }
      input[type="text"], input[type="password"] { padding: 0.75rem 0.875rem; font-size: 0.9375rem; }
      button { padding: 0.75rem; }
    }

    @media (max-width: 360px) {
      body { padding: 0.5rem; padding-top: 1.5rem; }
      .login-container { padding: 1.25rem; }
      .login-title { font-size: 1.25rem; }
      label { font-size: 0.875rem; }
      input[type="text"], input[type="password"] { padding: 0.65rem 0.75rem; font-size: 0.875rem; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="login-title">管理员登录</h1>
    <form method="post" action="/admin" novalidate>
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="name" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <div class="error-message">用户名或密码错误</div>
      <button type="submit">登 录</button>
    </form>
    <a href="/" class="back-link">返回首页</a>
  </div>
</body>
</html>
