<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签中心 - 精品网址导航</title>
  <link rel="stylesheet" href="/static/frontend.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="https://www.wangwangit.com/images/head/a.webp" type="image/webp">
</head>
<body>
  <button id="mobileToggle" class="mobile-toggle">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>
  <div id="mobileOverlay" class="mobile-overlay"></div>

  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">🔖</div>
          <span class="sidebar-brand-text">书签中心</span>
        </div>
        <button id="closeSidebar" class="sidebar-close">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="sidebar-search">
        <div class="search-input-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input id="searchInput" type="text" class="search-input" placeholder="搜索书签...">
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-title">分类导航</div>
        <ul class="nav-list">
          <li class="nav-item {{ALL_LINK_CLASS}}">
            <a href="?">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
              </svg>
              全部
            </a>
          </li>
          {{CATALOG_LINKS}}
        </ul>
      </nav>

      <div class="sidebar-footer">
      </div>
    </aside>

    <main class="main-content">
      <header class="hero">
        <div class="hero-inner">
          <div class="hero-content">
            <div class="hero-badge">
              <span>✦</span>
              <span>精选 · 实用 · 高效</span>
            </div>
            <h1 class="hero-title">书签中心</h1>
            <p class="hero-desc">精心收录优质网站资源，涵盖工具、学习、设计等多个领域，助你快速找到所需。</p>
          </div>
          <div class="hero-stats">
            <div class="hero-stats-label">资源总览</div>
            <div class="hero-stats-number">{{TOTAL_SITES}}</div>
            <div class="hero-stats-desc">个网站 · {{CATALOG_COUNT}} 个分类</div>
            <div class="hero-stats-note">持续更新，精选优质资源</div>
          </div>
        </div>
      </header>

      <section class="content-area">
        <div class="content-header">
          <h2 class="content-title" data-role="list-heading" data-default="{{HEADING_DEFAULT_ATTR}}" data-active="{{HEADING_ACTIVE_ATTR}}">{{HEADING_TEXT}}</h2>
        </div>

        <div class="sites-container">
          <div id="sitesGrid" class="sites-grid">
            {{SITE_CARDS}}
          </div>
        </div>
      </section>

      <footer>
      </footer>
    </main>
  </div>

  <button id="backToTop" class="back-to-top">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
    </svg>
  </button>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var sidebar = document.getElementById('sidebar');
      var mobileOverlay = document.getElementById('mobileOverlay');
      var mobileToggle = document.getElementById('mobileToggle');
      var closeSidebar = document.getElementById('closeSidebar');

      function openSidebar() {
        sidebar.classList.add('open');
        mobileOverlay.classList.add('visible');
        document.body.style.overflow = 'hidden';
      }

      function closeSidebarMenu() {
        sidebar.classList.remove('open');
        mobileOverlay.classList.remove('visible');
        document.body.style.overflow = '';
      }

      if (mobileToggle) mobileToggle.addEventListener('click', openSidebar);
      if (closeSidebar) closeSidebar.addEventListener('click', closeSidebarMenu);
      if (mobileOverlay) mobileOverlay.addEventListener('click', closeSidebarMenu);

      document.querySelectorAll('.copy-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var url = this.getAttribute('data-url');
          if (!url) return;

          var toast = document.createElement('span');
          toast.className = 'copy-toast';
          toast.textContent = '已复制!';
          this.appendChild(toast);

          navigator.clipboard.writeText(url).then(function() {
            setTimeout(function() { toast.remove(); }, 2000);
          }).catch(function() {
            var ta = document.createElement('textarea');
            ta.value = url;
            ta.style.position = 'fixed';
            document.body.appendChild(ta);
            ta.focus();
            ta.select();
            try {
              document.execCommand('copy');
              setTimeout(function() { toast.remove(); }, 2000);
            } catch (e) {
              alert('复制失败，请手动复制');
              toast.remove();
            }
            document.body.removeChild(ta);
          });
        });
      });

      var backToTop = document.getElementById('backToTop');
      window.addEventListener('scroll', function() {
        if (window.pageYOffset > 300) {
          backToTop.classList.add('visible');
        } else {
          backToTop.classList.remove('visible');
        }
      });
      if (backToTop) {
        backToTop.addEventListener('click', function() {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      }

      var searchInput = document.getElementById('searchInput');
      var sitesGrid = document.getElementById('sitesGrid');
      var siteCards = document.querySelectorAll('.site-card');

      if (searchInput && sitesGrid) {
        searchInput.addEventListener('input', function() {
          var keyword = this.value.toLowerCase().trim();
          siteCards.forEach(function(card) {
            var n = (card.getAttribute('data-name') || '').toLowerCase();
            var u = (card.getAttribute('data-url') || '').toLowerCase();
            var c = (card.getAttribute('data-catalog') || '').toLowerCase();
            if (n.includes(keyword) || u.includes(keyword) || c.includes(keyword)) {
              card.style.display = '';
            } else {
              card.style.display = 'none';
            }
          });

          var visible = sitesGrid.querySelectorAll('.site-card:not([style*="display: none"])');
          var heading = document.querySelector('[data-role="list-heading"]');
          if (heading) {
            var def = heading.dataset.default || '';
            var act = heading.dataset.active || '';
            if (keyword) {
              heading.textContent = '搜索结果 · ' + visible.length + ' 个网站';
            } else if (act) {
              heading.textContent = act + ' · ' + visible.length + ' 个网站';
            } else {
              heading.textContent = def.includes('全部收藏') ? def.replace(/\d+ 个网站/, visible.length + ' 个网站') : '全部收藏 · ' + visible.length + ' 个网站';
            }
          }
        });
      }
    });
  </script>
</body>
</html>
